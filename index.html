<!DOCTYPE html>

<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla Kanban</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header>
      <h1>Tablero de tareas Kanban</h1>
    </header>

    <main>

      <div class="encabezado">
        <!-- Zona para el formulario de tareas -->
        <section id="formulario">
            <h2>Nueva Tarea</h2>
            
            <form id="formulario-form">
              <label for="titulo" name="titulo">Título</label>
              <input for="titulo" type="text" id="titulo"><br/>

              <label for="descripcion" name="descripcion">Descripción</label>
              <textarea for="descripcion" id="descripcion"></textarea><br/>

              <label for="prioridad" name="prioridad">Prioridad</label>
              <select id="prioridad">
                <option value="baja">Baja</option>
                <option value="media">Media</option>
                <option value="alta">Alta</option>
              </select><br/>

              <label for="fecha" name="fecha">Fecha límite</label>
              <input for="fecha" type="date" id="fechaFin"><br/>

              <button type="submit" id="agregar">Agregar</button>
            </form>

        </section>

        <!-- Zona para los filtros -->
        <section id="filtros">
            <h2>Filtra</h2>

            <label for="estado" name="estado">Estado de la tarea</label>
            <select>
              <option value="">Estado</option>
            </select><br/>

            <label for="buscar" name="buscar">Busca por descripción</label>
            <input for="buscar" type="text"><br/>

            <button type="button">Buscar</button>
        </section>

        <!-- Zona para las estadisticas -->
         <section id="estadisticas">
          <aside id="estadisticas-aside">
            <h3>Estadísticas</h3>
            <p><span>Tareas:</span>  30</p>
            <p><span>Por hacer:</span>  10</p>
            <p><span>En proceso:</span>  10</p>
            <p><span>Completadas:</span>  10</p>
            <p><span>% Completadas:</span>  30%</p>
          </aside>
        </section>
      </div>

        <!-- Zona del tablero -->
        <section id="tablero">
            <div class="columna" id="toDo">
                <h3>Para hacer</h3>
            </div>
            
            <div class="columna" id="en-progreso">
                <h3>En progreso</h3>
            </div>
            
            <div class="columna" id="finalizado">
                <h3>Finalizado</h3>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Cesar</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
