<!DOCTYPE html>

<html lang="es">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="img/favicon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla Kanban</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header>
      <h1>Tablero de tareas Kanban</h1>
    </header>

    <main>

      <div class="encabezado">
        <!-- Zona para el formulario de tareas -->
        <section id="formulario">
            <h2>Nueva Tarea</h2>
            
            <form id="formulario-form">
              <label for="titulo" name="titulo">Título</label>
              <input for="titulo" type="text" id="titulo">

              <label for="descripcion" name="descripcion">Descripción</label>
              <textarea for="descripcion" id="descripcion"></textarea>

              <label for="prioridad" name="prioridad">Prioridad</label>
              <select id="prioridad">
                <option value="baja">Baja</option>
                <option value="media">Media</option>
                <option value="alta">Alta</option>
              </select>

              <label for="fecha" name="fecha">Fecha límite</label>
              <input for="fecha" type="date" id="fechaFin">

              <label for="estado" name="estado">Estado</label>
              <select id="estado">
                <option value="toDo">Por hacer</option>
                <option value="en-progreso">En progreso</option>
                <option value="finalizado">Finalizado</option>
              </select>

              <button type="submit" id="agregar">Agregar</button>
            </form>

        </section>

        <!-- Zona para los filtros -->
        <section id="filtros">
            <h2>Filtra</h2>
            <div id="filtra-form">
              <label for="estado" name="estado">Estado de la tarea</label>
              <select id="filtro-estado">
                <option value="all">Todos</option>
                <option value="toDo">Por hacer</option>
                <option value="en-progreso">En progreso</option>
                <option value="finalizado">Finalizado</option>
              </select>

              <label for="buscar" name="buscar">Busca por descripción</label>
              <input for="buscar" id="filtro-texto" type="text">

              <button type="button" id="btoFiltrar">Buscar</button>
            </div>
        </section>

        <!-- Zona para las estadisticas -->
         <section id="estadisticas">
          <aside id="estadisticas-aside">
            <h2>Estadísticas</h2>
            <p><span>Tareas:</span>  30</p>
            <p><span>Por hacer:</span>  10</p>
            <p><span>En proceso:</span>  10</p>
            <p><span>Completadas:</span>  10</p>
            <p><span>% Completadas:</span>  30%</p>
          </aside>
        </section>
      </div>

        <!-- Zona del tablero -->
        <section id="tablero">
            <div class="columna">
                <h3>Para hacer</h3>
                <div id="toDo"></div>
            </div>
            
            <div class="columna">
                <h3>En progreso</h3>
                <div id="en-progreso"></div>
            </div>
            
            <div class="columna">
                <h3>Finalizado</h3>
                <div id="finalizado"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Cesar</p>
    </footer>


    <script type="module" src="js/script.js"></script>
</body>
</html>
